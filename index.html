<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="sign_in">
        <div class="image">
            <img src="image/side_picture1.avif" alt="image">
        </div>
        <form action="#" method="get">
            <div class="head_form">
                <h1 class="title">Lorem ipsum, dolor sit amet consectetur adipisicing elit. Quasi quod beatae, distinctio et odio iusto, rem dolores sint qui neque expedita blanditiis praesentium. Est tenetur quis unde eveniet ad dolores.</h1>
                <p class="description">You know you want to</p>
            </div>
            <fieldset class="body_form">
                <legend>sign in</legend>
                <div class="firstname">
                    <label for="fname">First Name</label>
                    <input type="text" name="fname" id="fname">
                </div>
                <div class="lastname">
                    <label for="lname">Last Name</label>
                    <input type="text" name="lname" id="lname">
                </div>
                <div class="email_user">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email">
                </div>
                <div class="phone_number">
                    <label for="phone">Phone Number</label>
                    <input type="tel" name="phone" id="phone">
                </div>
                <div class="user_password">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password">
                </div>
                <div class="confirm_password">
                    <label for="confirm">Confirm Password</label>
                    <input type="password" name="confirm" id="confirm">
                </div>
            </fieldset>
            <div class="foot_form">
                <button type="submit">send me</button>
                <p>Already have an account? <span>Log in</span></p>
            </div>
        </form>
    </div>
</body>
</html>
