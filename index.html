<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="sign_in">
        <div class="image">
            <img src="image/side_picture.avif" alt="image">
        </div>
        <form id="form" class="form_signin" action="#" method="get">
            <div class="head_form">
                <h1 class="title">This is the online service. We need your information for product, sale and support if you need </h1>
                <p class="description">You know you want to</p>
            </div>
            <div class="body_form">
                <div class="left">
                    <div class="firstname">
                        <label for="fname">First Name</label>
                        <input type="text" name="fname" id="fname" required>
                        <span></span>
                    </div>
                    <div class="lastname">
                        <label for="lname">Last Name</label>
                        <input type="text" name="lname" id="lname" required>
                        <span></span>
                    </div>
                    <div class="email_user">
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" placeholder="abc@gmail.com" required>
                        <span></span>
                    </div>
                </div>
                <div class="right">
                    <div class="phone_number">
                        <label for="phone">Phone Number(option)</label>
                        <input type="tel" name="phone" id="phone" placeholder="0123-456-7890">
                        <span></span>
                    </div>
                    <div class="password_field">
                        <label for="password">Password</label>
                        <input type="password" name="password" id="password" placeholder="XXXXXXXX" required minlength="8" maxlength="100">
                        <span></span>

                        <ul class="password_rule">
                            <li id="length">at least 8 character</li>
                            <li id="number">at least 1 number</li>
                            <li id="character">at least 1 alphabet</li>
                        </ul>
                    </div>
                    <div class="confirm_password">
                        <label for="confirm">Confirm Password</label>
                        <input type="password" name="confirm" id="confirm" placeholder="XXXXXXXX" required maxlength="10">
                        <span></span>
                    </div>
                </div>
            </div>
            <div class="foot_form">
                <button id="btn" type="submit">send me</button>
                <p>Already have an account? <span class="log">Log in</span></p>
            </div>
        </form>
    </div>
</body>
</html>
