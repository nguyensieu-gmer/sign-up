<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="sign_in">
        <div class="image">
            <img src="image/side_picture.avif" alt="image">
        </div>
        <form id="form" class="form_signin" action="#" method="get">
            <div class="head_form">
                <h1 class="title">This is the online service. We need your information for product, sale and support if you need </h1>
                <p class="description">You know you want to</p>
            </div>
            <div class="body_form">
                <div class="email_user">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" placeholder="abc@gmail.com" required>
                    <span></span>
                </div>
                <div class="password_field">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" placeholder="XXXXXXXX" required minlength="8" maxlength="100">
                    <span></span>
                </div>
            </div>
            <div class="foot_form">
                <button id="btn" type="submit">logn in</button>
                <p>You don't have an account. <span class="sign">sign in</span></p>
            </div>
        </form>
    </div>
</body>
</html>
